name: Build and Deploy
# 触发器：当代码 push 到 main 分支时触发
on: 
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    # 运行环境：最新的 Ubuntu 系统
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4 # 使用官方的 checkout action
      # 第二步：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      # 第三步：缓存 node_modules 依赖
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      # 第四步：构建前端
      - name: Build Frontend
        run: |
          echo "🚀 Building frontend..."
          cd blog-client
          npm install
          npm run build
          cd ../blog-background
          npm install
          npm run build
      # 第五步：构建后端
      - name: Build Backend
        run: |
          echo "🚀 Building backend..."
          cd blog-server
          npm ci
          cd ../
          node scripts/blog-server-update.js
      # 创建 .env 文件
      - name: Create .env file for Server
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          echo "📄 Creating .env file..."
          if [ -z "$EMAIL_USER" ] || [ -z "$EMAIL_PASS" ]; then
            echo "::error::Missing EMAIL_USER or EMAIL_PASS in GitHub Actions secrets."
            exit 1
          fi
          printf 'EMAIL_USER=%s\n' "$EMAIL_USER" > server/.env
          printf 'EMAIL_PASS=%s\n' "$EMAIL_PASS" >> server/.env
          test -s server/.env
          echo "✅ .env file created."
      # 第六步：打包构建产物
      # 把前后端的构建结果打成一个压缩包，方便传输
      - name: Package Artifacts
        run: |
          echo "📦 Packaging artifacts..."
          rm -rf deploy
          mkdir -p deploy/frontend
          mv blog-client/dist deploy/frontend/
          mkdir -p deploy/admin
          mv blog-background/dist deploy/admin/
          mv server ./deploy/server
          tar -zcvf deploy.tar.gz -C deploy .
          ls -lh deploy.tar.gz
          tar -tzf deploy.tar.gz | sed -n '1,80p'
      # 第七步：传输到服务器
      - name: Copy package to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          port: ${{ secrets.REMOTE_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"  # 本地文件 (在 runner 上)
          target: "/tmp"            # 远程目标目录 (在服务器上)
          timeout: 60s
          command_timeout: 10m
          debug: true
      # 第八步：在服务器上执行部署命令
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}         # 服务器 IP 地址
          username: ${{ secrets.REMOTE_USER }}      # 服务器用户名
          port: ${{ secrets.REMOTE_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}     # SSH 私钥
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            
            DEPLOY_PATH="/var/www"
            
            echo "🚀 Unpacking and deploying on server..."
            test -s /tmp/deploy.tar.gz
            ls -lh /tmp/deploy.tar.gz
            
            echo "🧹 Cleaning up old deployment..."
            rm -rf $DEPLOY_PATH/frontend $DEPLOY_PATH/admin $DEPLOY_PATH/server
            
            echo "📦 Extracting new files..."
            tar -zxvf /tmp/deploy.tar.gz -C $DEPLOY_PATH
            test -f $DEPLOY_PATH/server/package.json
            
            echo "🔧 Installing backend dependencies..."
            cd $DEPLOY_PATH/server
            npm ci --omit=dev
            
            echo "🔄 Restarting services..."
            pm2 restart blog-server
            systemctl reload nginx
            
            echo "✅ Deployment successful!"
